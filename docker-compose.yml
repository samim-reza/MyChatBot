services:
  app:
    # Deploys pull this prebuilt image (published by GitHub Actions) so the
    # VPS never has to run the memory-hungry Next.js build itself.
    # `docker compose up -d --build` still builds locally when needed.
    image: ghcr.io/samim-reza/mychatbot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mychatbot
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${PORT:-8000}"
    volumes:
      - ./data/personal.json:/app/data/personal.json
      - ./data/chroma_db:/app/data/chroma_db

  caddy:
    image: caddy:2-alpine
    container_name: mychatbot-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
