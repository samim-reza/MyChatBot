services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mychatbot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./data/personal.json:/app/data/personal.json
      - ./data/chroma_db:/app/data/chroma_db
