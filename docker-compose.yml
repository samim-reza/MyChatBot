services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mychatbot
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${PORT:-8000}"
    volumes:
      - ./data/personal.json:/app/data/personal.json
      - ./data/chroma_db:/app/data/chroma_db

  caddy:
    image: caddy:2-alpine
    container_name: mychatbot-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
